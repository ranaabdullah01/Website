backend:
  name: github
  repo: ranaabdullah01/Website   # e.g., "john/ai-affiliate-site"
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "home"
    label: "Homepage Content"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "content/hero.md"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subhead", widget: "text" }
          - { label: "Price", name: "price", widget: "number", default: 9 }
          - { label: "Old Price", name: "oldPrice", widget: "string", default: "$27" }
          - { label: "Video URL (walkthrough)", name: "videoUrl", widget: "string", required: false }
          - { label: "Body (main content)", name: "body", widget: "markdown" }

      - name: "testimonials"
        label: "Testimonials"
        file: "content/testimonials.json"
        fields:
          - label: "Testimonials List"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Rating", name: "rating", widget: "number", default: 5 }

      - name: "faq"
        label: "FAQ"
        file: "content/faq.json"
        fields:
          - label: "FAQ Items"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Question", name: "question", widget: "string" }
              - { label: "Answer", name: "answer", widget: "markdown" }
